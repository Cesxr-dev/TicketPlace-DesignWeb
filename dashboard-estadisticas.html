<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketPlace - Dashboard</title>
    <!-- Google Fonts: Open Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/stylePnlAdmin.css">
</head>
<body class="dashboard-layout">

    <!-- BARRA LATERAL (Sidebar Izquierdo) -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <span class="logo">TicketPlace</span>
        </div>
        
        <nav class="sidebar-nav">
            <ul>
                <li>
                    <a href="#" class="sidebar-link active">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                        Dashboard
                    </a>
                </li>
                <li>
                    <a href="dashboard-eventos.html" class="sidebar-link">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        Eventos
                    </a>
                </li>
                <li>
                    <a href="#" class="sidebar-link">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="#6b7280"  viewBox="0 0 256 256" stroke="currentColor"><path d="M124,216a12,12,0,0,1-12,12H48a12,12,0,0,1-12-12V40A12,12,0,0,1,48,28h64a12,12,0,0,1,0,24H60V204h52A12,12,0,0,1,124,216Zm108.49-96.49-40-40a12,12,0,0,0-17,17L195,116H112a12,12,0,0,0,0,24h83l-19.52,19.51a12,12,0,0,0,17,17l40-40A12,12,0,0,0,232.49,119.51Z"></path></svg>
                        Cerrar Sesion
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Perfil del Administrador -->
        <div class="sidebar-user">
            <div class="user-avatar">C</div>
            <div class="user-info">
                <span class="user-name">Cesar Demian</span>
                <span class="user-role">Administrador</span>
            </div>
        </div>
    </aside>

    <!-- CONTENEDOR DERECHO -->
    <div class="main-wrapper">
        
        <!-- Header Superior -->
        <header class="dashboard-header">
            <span class="header-logo-mobile">TicketPlace</span>
            <div class="header-actions">
                <button type="button" class="btn-panel">Panel</button>
                <div class="header-avatar-circle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
            </div>
        </header>

        <!-- Contenido Principal de Estadisticas -->
        <main class="dashboard-content">
            
            <!-- Mensaje de Bienvenida -->
            <div class="welcome-heading">
                <h1>Bienvenido de nuevo, Cesar</h1>
                <p class="subtitle">Aquí tienes el resumen de tu actividad hoy.</p>
            </div>

            <!-- Grid de Tarjetas Estadisticas-->
            <div class="metrics-grid">
                
                <!-- Tarjeta 1: Ingresos -->
                <article class="metric-card">
                    <h2 class="metric-label">Ingresos Totales</h2>
                    <p class="metric-value">$1,240,500 <span class="metric-unit">MXN</span></p>
                </article>

                <!-- Tarjeta 2: Boletos Vendidos -->
                <article class="metric-card">
                    <h2 class="metric-label">Boletos Vendidos</h2>
                    <p class="metric-value">8,432 <span class="metric-unit">unid.</span></p>
                </article>

                <!-- Tarjeta 3: Eventos Activos -->
                <article class="metric-card">
                    <h2 class="metric-label">Eventos Activos</h2>
                    <p class="metric-value">24 <span class="metric-unit">eventos</span></p>
                </article>

            </div>

        </main>
    </div>
</body>
</html>
